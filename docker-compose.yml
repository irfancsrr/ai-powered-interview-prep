version: '3.2'

services:
  server:
    build: ./backend
    container_name: express-server
    ports:
      - "5000:5000"
    networks:
      - fullstack-net
    restart: unless-stopped
  client:
    build: ./frontend/interview-prep-ai
    container_name: react-client
    ports:
      - "5173:3000"
    networks:
      - fullstack-net
    depends_on:
      - server
    restart: unless-stopped

networks:
  fullstack-net:
    driver: bridge

  